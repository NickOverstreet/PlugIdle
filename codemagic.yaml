# Codemagic pipeline for the Mac-free iOS release of PlugIdle.
#
# The ios/ Xcode project is NOT committed — it is generated fresh from
# declarative config on every build (capacitor.config.json + scripts/patch-ios-plist.sh
# + assets/), so this archive is fully reproducible from Windows. See
# docs/superpowers/specs/2026-06-18-ios-app-store-launch-design.md.
#
# Signing is automatic via an App Store Connect API key managed in the Codemagic
# UI; no signing material lives in this repo. See "Codemagic setup" at the bottom
# for the exact integrations/secrets the user must configure.

workflows:
  ios-release:
    name: PlugIdle iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      # Label of the App Store Connect API key added in the Codemagic UI
      # (Team settings -> Integrations -> Developer Portal -> Manage keys).
      # This is just a reference name, not the secret itself.
      app_store_connect: PlugIdle ASC Key
    environment:
      # NOTE: deliberately no `ios_signing:` block. Its pre-build prep only
      # FETCHES existing profiles and fails ("No matching profiles found") before
      # scripts run — fatal for a brand-new app with no profile yet. Signing is
      # done explicitly in the "Set up code signing" step, which CREATES the cert
      # + profile using CERTIFICATE_PRIVATE_KEY.
      groups:
        # Holds CERTIFICATE_PRIVATE_KEY — a persistent RSA key so signing creates
        # ONE distribution cert and reuses it every build. Without it each build
        # mints a throwaway cert and hits "Cannot save Signing Certificates
        # without certificate private key".
        - ios_credentials
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 22
      xcode: latest
      cocoapods: default
    triggering:
      # Manual runs are always available from the Codemagic UI (no YAML needed).
      # This auto-triggers on version tags like v1.0.0.
      events:
        - tag
      tag_patterns:
        - pattern: 'v*.*.*'
          include: true
    scripts:
      - name: Install npm dependencies
        script: npm ci

      # AdMob now ships on iOS too (rewarded ads). The Google Mobile Ads SDK pod
      # enters the Podfile via @capacitor-community/admob; scripts/patch-ios-plist.sh
      # adds the GADApplicationIdentifier it requires (or the app crashes on
      # launch) plus the ATT NSUserTrackingUsageDescription and SKAdNetwork items.
      - name: Stage web assets
        script: npm run build:www

      - name: Add iOS platform (ephemeral; ios/ is not committed)
        # Capacitor 8 defaults to Swift Package Manager, which produces no
        # Podfile; force CocoaPods so the Podfile-based steps below (pod install,
        # AdMob-pod check, --workspace build) work as designed.
        script: npx cap add ios --packagemanager cocoapods

      # iOS App Store icons must be fully opaque — a transparent icon passes the
      # local archive but Apple invalidates the build during processing (ITMS-90717),
      # with email as the only signal. Flatten the source onto the brand background
      # before generating the AppIcon set so a stray alpha channel can't slip through.
      # sharp is already installed (it's the image core @capacitor/assets uses next).
      - name: Flatten app icon (iOS icons must have no alpha channel)
        script: |
          node -e "const sharp=require('sharp');const fs=require('fs');sharp('assets/icon.png').flatten({background:'#070a0f'}).png().toBuffer().then(b=>{fs.writeFileSync('assets/icon.png',b);console.log('icon flattened (opaque)');}).catch(e=>{console.error(e);process.exit(1);})"

      - name: Generate iOS icon set + splash from assets/
        script: |
          npx @capacitor/assets generate --ios \
            --iconBackgroundColor '#070a0f' \
            --iconBackgroundColorDark '#070a0f' \
            --splashBackgroundColor '#070a0f' \
            --splashBackgroundColorDark '#070a0f'

      - name: Patch Info.plist (display name, portrait lock, export compliance)
        script: bash scripts/patch-ios-plist.sh

      - name: Sync web assets into the iOS project
        script: npx cap sync ios

      # Capacitor generates the Podfile above, so pod install must run AFTER
      # cap add/sync (unlike samples that assume a committed ios/).
      - name: CocoaPods install
        script: cd ios/App && pod install

      - name: Verify AdMob pod is present
        script: |
          if ! grep -q -e 'CapacitorCommunityAdmob' -e 'Google-Mobile-Ads-SDK' ios/App/Podfile.lock; then
            echo "AdMob / Google Mobile Ads SDK missing from the iOS build" >&2
            exit 1
          fi
          echo "confirmed: AdMob / Google Mobile Ads SDK present in the iOS build"

      - name: Set up code signing
        # --certificate-key uses the persistent CERTIFICATE_PRIVATE_KEY so the
        # distribution cert is created once and reused (no more "Cannot save
        # Signing Certificates without certificate private key").
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.ignyte.plugidle" \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles

      # Marketing version (CFBundleShortVersionString) comes from package.json — the
      # single source `npm run bump` writes — so the App Store build shows the real
      # version instead of Capacitor's template default 1.0. The build number
      # (CFBundleVersion) uses Codemagic's monotonic $BUILD_NUMBER (Apple rejects
      # duplicates) and needs no App Store app id.
      - name: Set version + build number
        script: |
          VERSION=$(node -p "require('$CM_BUILD_DIR/package.json').version")
          cd "$CM_BUILD_DIR/ios/App"
          agvtool new-marketing-version "$VERSION"
          agvtool new-version -all "$BUILD_NUMBER"

      # Run from ios/App so build-ipa's default --ipa-directory (the relative
      # build/ios/ipa) resolves under ios/App, matching the artifact glob below.
      - name: Build IPA
        script: |
          cd "$CM_BUILD_DIR/ios/App"
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Flip to true (optionally add beta_groups / release_type) when promoting
        # a TestFlight build to App Store review.
        submit_to_app_store: false

  # Android counterpart to ios-release. The Android Xcode-equivalent (the
  # android/ Gradle project) IS committed, so this build just stages web assets,
  # syncs, and bundles a signed AAB on Linux. It shares the v*.*.* tag trigger
  # with ios-release, so one tag push publishes to BOTH stores at once. Unlike
  # the iOS build, AdMob is kept in (Android ships rewarded ads at launch).
  android-release:
    name: PlugIdle Android Release
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      android_signing:
        # Reference name of the upload keystore added in the Codemagic UI
        # (Team settings -> Code signing identities -> Android keystores).
        # Codemagic exposes it to Gradle as CM_KEYSTORE_PATH / CM_KEYSTORE_PASSWORD
        # / CM_KEY_ALIAS / CM_KEY_PASSWORD, which android/app/build.gradle reads.
        - plugidle_upload_keystore
      groups:
        # Secure env var group holding GCLOUD_SERVICE_ACCOUNT_CREDENTIALS (the
        # Google Play service-account JSON). Created in the Codemagic UI.
        - google_play
      node: 22
      java: 21
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*.*.*'
          include: true
    scripts:
      - name: Install npm dependencies
        script: npm ci

      - name: Stage web assets
        script: npm run build:www

      - name: Sync web assets into the Android project
        script: npx cap sync android

      # versionCode comes from Codemagic's per-PROJECT build counter so it
      # strictly increases on every Android upload (a Play requirement),
      # independent of the human-facing versionName carried by the git tag.
      # build.gradle reads -PversionCode with a local fallback. PROJECT (not
      # per-workflow) is required: a per-workflow counter would restart at 1,
      # below the versionCode already uploaded, and Play would reject it.
      - name: Build signed release AAB
        script: |
          cd android
          ./gradlew bundleRelease -PversionCode=$PROJECT_BUILD_NUMBER
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
      # Only emitted once R8/shrinking is enabled (minifyEnabled is false today);
      # the missing glob is skipped harmlessly until then.
      - android/app/build/outputs/mapping/release/mapping.txt
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        # Land the upload as a draft on the internal track rather than
        # auto-rolling it out to testers. Set to false to push live immediately.
        submit_as_draft: true

# ----------------------------------------------------------------------------
# Codemagic setup (one-time, done by the user in the Codemagic UI — never in
# this public repo):
#
#   0. Connect the repo so pushes actually trigger builds. Apps -> Add
#      application -> pick this GitHub repo via the Codemagic GitHub App
#      integration; that connection auto-creates the GitHub webhook which
#      delivers tag pushes to Codemagic. WITHOUT this step the `triggering:`
#      blocks above do nothing: a `v*.*.*` tag won't start a build because
#      Codemagic never hears the push. Verify after connecting -> GitHub repo
#      Settings -> Webhooks should list a codemagic.io hook with recent,
#      successful deliveries. (Connecting via a raw token/SSH instead of the
#      GitHub App can skip the webhook; reconnect via the GitHub App if tag
#      pushes don't auto-trigger.)
#
#   1. Team settings -> Integrations -> Developer Portal -> Manage keys:
#      upload the App Store Connect API key .p8 plus its Issuer ID and Key ID.
#      Name the key exactly "PlugIdle ASC Key" to match `integrations` above
#      (or rename both to match).
#
#   2. The App ID com.ignyte.plugidle and the app record must already
#      exist in App Store Connect (see store/app-store-connect-checklist.md)
#      before the first publishing build.
#
# For ios-release, no environment variable groups are required: automatic
# signing and TestFlight publishing both read the App Store Connect integration.
#
# android-release additionally needs (one-time, in the Codemagic UI + Google):
#
#   3. Generate an upload keystore locally (keep it private; never commit it):
#        keytool -genkeypair -v -keystore plugidle-upload.keystore \
#          -alias plugidle-upload -keyalg RSA -keysize 2048 \
#          -validity 10000 -storetype JKS
#
#   4. Team settings -> Code signing identities -> Android keystores: upload the
#      .keystore with its store password, key alias (plugidle-upload), and key
#      password. Set the reference name to "plugidle_upload_keystore" to match
#      `android_signing` above (or rename both to match).
#
#   5. Create a Google Cloud service account, add a JSON key, and enable the
#      "Google Play Android Developer API" for that project. In Play Console
#      (Users & permissions) invite the service-account email and grant it
#      release access to testing tracks.
#
#   6. Application/Team settings -> Environment variables: create a group named
#      "google_play" (matches `groups` above) and add GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
#      with the entire service-account JSON as its value, marked Secure.
#
#   7. HARD GOOGLE CONSTRAINT: the Play Developer API rejects automated uploads
#      until the app has had a first AAB uploaded MANUALLY in Play Console.
#      Download the AAB artifact from one Codemagic run (or build locally) and
#      upload it by hand to Internal testing once, enrolling in Play App Signing.
#      After that, this workflow's publishing step succeeds on every tag.
# ----------------------------------------------------------------------------
