name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Allow the workflow to deploy to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; let in-progress ones finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        # enablement: true turns Pages on automatically if it isn't already,
        # so no manual repo-settings step is required.
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Stamp the service worker cache with the commit SHA
        # The committed sw.js CACHE value is only a placeholder; the deployed copy
        # is stamped with the short commit SHA so every deploy invalidates the old
        # cache and returning PWA players always get fresh assets — no manual bump.
        run: |
          sha="${GITHUB_SHA::7}"
          sed -i "s/const CACHE = 'plugidle-[^']*';/const CACHE = 'plugidle-${sha}';/" sw.js
          grep "const CACHE" sw.js

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
